<mat-card class="max-w-lg mx-auto mt-32 p-8 bg-white rounded-lg shadow-md">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-semibold text-[var(--pharma-primary)]">Login to Your Account</h2>
        </div>
        <mat-form-field appearance="fill" class="w-full mb-4">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email" required>
        </mat-form-field>

        <mat-form-field appearance="fill" class="w-full">
            <mat-label>Password</mat-label>
            <input matInput formControlName="password" type="password" required>
        </mat-form-field>

        <button mat-raised-button type="submit" class="w-full" style="background-color: var(--pharma-primary); color: var(--pharma-on-primary);">Login</button>
    </form>
</mat-card>
