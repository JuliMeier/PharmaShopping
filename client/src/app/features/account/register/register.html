<mat-card class="max-w-lg mx-auto mt-32 p-8 bg-white rounded-lg shadow-md">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-semibold text-[var(--pharma-primary)]">Register Your Account</h2>
        </div>
        <app-text-input label="First Name" type="text" formControlName="firstName" />

        <app-text-input label="Last Name" type="text" formControlName="lastName" />

        <app-text-input label="Email" type="email" formControlName="email" />

        <app-text-input label="Password" type="password" formControlName="password" />

        @if (validationErrors) {
            <div class="mt-4 mb-4 p-4 bg-red-100 text-red-700 rounded">
                <ul class="list-disc list-inside">
                    @for (error of validationErrors; track $index) {
                        <li>{{ error }}</li>
                    }
                </ul>
            </div>
        }

        <button [disabled]="registerForm.invalid" mat-raised-button type="submit" class="w-full"
  [style.background-color]="registerForm.invalid ? '' : 'var(--pharma-primary)'"
  [style.color]="registerForm.invalid ? '' : 'var(--pharma-on-primary)'">Register</button>
    </form>
</mat-card>
