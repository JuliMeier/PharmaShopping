<header class="shadow-md p-3 w-full fixed z-50 bg-white top-0 left-0">
  <div class="flex align-middle items-center justify-between max-w-screen-2xl mx-auto">
    <img routerLink="/" src="/images/logo.svg" alt="app logo" class="max-h-16">
    <nav class="flex gap-3 my-2 uppercase text-2xl">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" 
        class="text-[var(--pharma-primary)] hover:text-[var(--pharma-secondary)] transition-colors">Home</a>
      <a routerLink="/shop" routerLinkActive="active"
        class="text-[var(--pharma-primary)] hover:text-[var(--pharma-secondary)] transition-colors">Shop</a>
      <a routerLink="/test-error" routerLinkActive="active"
        class="text-[var(--pharma-primary)] hover:text-[var(--pharma-secondary)] transition-colors">Test Error</a>
    </nav>
    <div class="flex gap-3 align-middle">
      <a matBadge="5" matBadgeSize="large" class="custom-badge mt-2 mr-2">
        <mat-icon>shopping_cart</mat-icon>
      </a>
      <button mat-stroked-button>Login</button>
      <button mat-stroked-button>Register</button>
    </div>
  </div>
</header>

@if (busyService.loading) {
  <mat-progress-bar mode="indeterminate" class="fixed top-22 z-50" color="accent"></mat-progress-bar>
}
